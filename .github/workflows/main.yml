name: Build App

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a new release?'
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
            display_name: macOS_Intel
            suffix: dmg
          - os: macos-14
            arch: arm64
            display_name: macOS_Apple_Silicon
            suffix: dmg
          - os: ubuntu-22.04
            arch: x86_64
            display_name: Linux_x86_64
            suffix: AppImage
          - os: ubuntu-24.04-arm
            arch: aarch64
            display_name: Linux_ARM64
            suffix: AppImage

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linux Dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2 binutils zip libegl1 libopengl0 libxcb-cursor0 \
          zenity wmctrl libayatana-appindicator3-dev \
          python3-gi gir1.2-ayatanaappindicator3-0.1 gir1.2-gtk-3.0 gir1.2-dbusmenu-glib-0.4 \
          libgirepository1.0-dev libcairo2-dev pkg-config
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Install PyGObject for Linux tray
      if: startsWith(matrix.os, 'ubuntu')
      run: pip install "PyGObject==3.42.2"

        
    - name: Generate Obfuscated Config and Version
      env:
        SS_DEV_ID: ${{ secrets.SS_DEV_ID }}
        SS_DEVPASS: ${{ secrets.SS_DEVPASS }}
        SS_USER: ${{ secrets.SS_USER }}
        SS_PASS: ${{ secrets.SS_PASS }}
      run: |
        python3 scripts/build/build_utils.py
        
    - name: Build macOS App and DMG
      if: startsWith(matrix.os, 'macos')
      env:
        SS_DEV_ID: ${{ secrets.SS_DEV_ID }}
        SS_DEVPASS: ${{ secrets.SS_DEVPASS }}
        SS_USER: ${{ secrets.SS_USER }}
        SS_PASS: ${{ secrets.SS_PASS }}
      run: |
        chmod +x scripts/build/build_app.sh
        ./scripts/build/build_app.sh
        brew install create-dmg
        cd dist
        mkdir dmg_source
        cp -R "VPX Manager for ES-DE.app" dmg_source/
        create-dmg \
          --volname "VPX Manager Installer" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "VPX Manager for ES-DE.app" 175 190 \
          --hide-extension "VPX Manager for ES-DE.app" \
          --app-drop-link 425 190 \
          "VPX_Manager_${{ matrix.display_name }}.dmg" \
          "dmg_source/"

    - name: Build Linux AppImage
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        chmod +x scripts/build/build_app.sh
        ./scripts/build/build_app.sh
        cd dist
        mv "VPX_Manager-${{ matrix.arch }}.AppImage" "VPX_Manager_${{ matrix.display_name }}.AppImage"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VPX_Manager_${{ matrix.display_name }}
        path: dist/VPX_Manager_${{ matrix.display_name }}.${{ matrix.suffix }}
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Get version
      id: get_version
      run: |
        VERSION=$(cat backend/core/version.txt | xargs)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/VPX_Manager_*.dmg
          dist/VPX_Manager_*.AppImage
        tag_name: v${{ steps.get_version.outputs.version }}
        name: v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
