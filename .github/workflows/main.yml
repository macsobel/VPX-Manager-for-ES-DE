name: Build macOS App

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a new release?'
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2 binutils
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Generate Obfuscated Config and Version
      env:
        SS_DEV_ID: ${{ secrets.SS_DEV_ID }}
        SS_DEVPASS: ${{ secrets.SS_DEVPASS }}
      run: |
        echo "${{ github.run_number }}" > version.txt
        python3 build_utils.py
        
    - name: Build macOS App
      if: matrix.os == 'macos-latest'
      run: |
        chmod +x build_app.sh
        ./build_app.sh
        cd dist
        zip -r "VPX_Manager_macOS.zip" "VPX Manager for ES-DE.app"

    - name: Build Linux AppImage
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x build_app.sh
        ./build_app.sh
        # The script creates VPX_Manager-x86_64.AppImage in dist/
        
    - name: Upload Artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VPX_Manager_macOS
        path: dist/VPX_Manager_macOS.zip
        
    - name: Upload Artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VPX_Manager_Linux
        path: dist/VPX_Manager-x86_64.AppImage
        
    - name: Create or Update Release
      if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VPX_Manager*
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
